<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <link rel="icon" type="image/svg+xml" href="/vite.svg" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="description" content="DUMUZI — Handcrafted confectionery. Experience the finest artisanal dark truffles, signature collections, and customizable premium gift boxes." />
  <meta name="keywords" content="DUMUZI, confectionery, dark truffles, artisanal sweets, gift box, premium sweets, gourmet treats" />
  <!-- Tailwind CSS CDN — guarantees utilities load on every platform -->
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: {
        extend: {
          fontFamily: {
            display: ['"Playfair Display"', 'Georgia', 'serif'],
            sans: ['Inter', '"DM Sans"', 'sans-serif'],
          },
          colors: {
            gold: '#B18858',
            'gold-soft': '#C9A06A',
            cream: '#F4F0EA',
            muted: '#D8D2CB',
          }
        }
      }
    }
  </script>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600&amp;family=Outfit:wght@400;500;600;700&amp;family=Material+Icons+Outlined&amp;display=swap"
    rel="stylesheet" />
  <title>DUMUZI</title>

  <!-- Open Graph / Social -->
  <meta property="og:type" content="website" />
  <meta property="og:title" content="DUMUZI" />
  <meta property="og:description" content="Indulge in artisanal chocolate truffles, signature dark chocolates, and luxury collections, beautifully crafted for every special occasion." />
  <meta property="og:site_name" content="DUMUZI" />

  <!-- Structured Data: Organization -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "OnlineStore",
    "name": "DUMUZI",
    "url": "https://dumuzi.com",
    "logo": "https://dumuzi.com/logo.jpg",
    "description": "DUMUZI is a premium handcrafted confectionery brand, offering the finest single-origin dark truffles, gold collections, and custom gift boxes.",
    "email": "hello@dumuzi.com",
    "sameAs": [
      "https://www.facebook.com/dumuzi",
      "https://www.instagram.com/dumuzi"
    ]
  }
  </script>

  <!-- Structured Data: FAQPage -->
  <script type="application/ld+json">
  {
    "@context": "https://schema.org",
    "@type": "FAQPage",
    "mainEntity": [{
      "@type": "Question",
      "name": "What makes DUMUZI chocolates unique?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "DUMUZI chocolates are handcrafted by master artisans using premium single-origin cocoa and natural ingredients, without artificial preservatives."
      }
    },{
      "@type": "Question",
      "name": "Do you provide international shipping?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes, we ship worldwide using express temperature-controlled packaging to ensure the chocolates reach you in perfect condition."
      }
    },{
      "@type": "Question",
      "name": "Can I custom order gift boxes?",
      "acceptedAnswer": {
        "@type": "Answer",
        "text": "Yes. You can customize the assortment of truffles and choose from our premium gift wrapping options for any special occasion."
      }
    }]
  }
  </script>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
